<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Casa Margarita</title>

<meta name="viewport" content="width=device-width,initial-scale=1">

<link rel="stylesheet" href="style.css">

</head>

<body>

<header class="nav">

<h2>🏝 Casa Margarita</h2>

</header>

<section class="gallery">

<img src="app/house/1.jpg" class="g">
<img src="app/house/2.jpg" class="g">
<img src="app/house/3.jpg" class="g">
<img src="app/house/4.jpg" class="g">
<img src="app/house/5.jpg" class="g">

</section>

<div id="viewer">

<span id="close">✕</span>

<img id="viewer-img">

</div>

<div class="layout">

<h1 id="title"></h1>
<p id="location"></p>

<h2>Descripción</h2>
<p id="description"></p>

<h2>Comodidades</h2>
<div id="perks"></div>

</div>

<div class="right">

<div class="card">

<h2 id="price"></h2>

<div id="calendar">

<div id="month1"></div>
<div id="month2"></div>

</div>

<label>Personas</label>

<input type="number" id="guests" value="2">

<div id="total"></div>

<button id="reserve">Reservar</button>

<button id="whatsapp">WhatsApp</button>

</div>

</div>

</div>

<script type="module" src="app.js"></script>

</body>

</html>
